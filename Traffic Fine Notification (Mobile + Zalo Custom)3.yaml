blueprint:
  name: Traffic Fine Notification (Mobile + Zalo Bot)
  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    vehicles:
      name: Vehicles
      selector:
        entity:
          filter:
            - domain: sensor
              integration: template
          multiple: true

    notify_device:
      name: Device to notify (Mobile App)
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    zalo_thread_id:
      name: Zalo Thread ID
      selector:
        text:

    zalo_account:
      name: Zalo Account Selection
      selector:
        text:

mode: queued
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input vehicles

variables:
  entity_id: "{{ trigger.entity_id }}"
  vehicle_name: "{{ state_attr(trigger.entity_id, 'friendly_name') }}"
  vehicle_state: "{{ states(trigger.entity_id) }}"

conditions:
  - condition: template
    value_template: >
      {{ vehicle_state not in ['unknown','unavailable',''] }}

actions:

  ####################################################
  # 📱 MOBILE
  ####################################################
  - repeat:
      for_each: !input notify_device
      sequence:
        - action: notify.mobile_app
          data:
            target: "{{ repeat.item }}"
            title: "🚗 Xe {{ vehicle_name }}"
            message: "{{ vehicle_state }}"
            data:
              tag: "{{ 'traffic_fine_' ~ entity_id }}"

  ####################################################
  # 💬 ZALO
  ####################################################
  - action: zalo_bot.send_message
    data:
      type: "1"
      message: >
        🚗 Xe {{ vehicle_name }}

        {{ vehicle_state }}
      thread_id: !input zalo_thread_id
      account_selection: !input zalo_account
