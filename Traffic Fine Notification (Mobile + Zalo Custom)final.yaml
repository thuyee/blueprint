blueprint:
  name: Traffic Fine Notification (Mobile + Zalo Bot)
  author: luuquangvu + fixed by ChatGPT
  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    vehicles:
      name: Vehicles
      description: Các sensor biển số xe (template sensor)
      selector:
        entity:
          filter:
            - domain: sensor
              integration: template
          multiple: true

    notify_device:
      name: Device to notify (Mobile App)
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    zalo_thread_id:
      name: Zalo Thread ID
      selector:
        text:

    zalo_account:
      name: Zalo Account Selection
      description: Ví dụ +84868837123
      selector:
        text:

mode: queued
max_exceeded: silent

variables:
  zalo_thread: !input zalo_thread_id
  zalo_account_selection: !input zalo_account
  vehicle_name: "{{ trigger.to_state.name if trigger.to_state is not none else '' }}"
  vehicle_state: "{{ trigger.to_state.state if trigger.to_state is not none else '' }}"

triggers:
  - platform: state
    entity_id: !input vehicles

conditions:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.from_state.state not in ['unavailable', 'unknown'] }}

  - condition: template
    value_template: >
      {{ trigger.to_state is not none
         and trigger.to_state.state not in ['unavailable', 'unknown'] }}

  - condition: template
    value_template: >
      {{ trigger.to_state.attributes.get('data') is defined
         and not trigger.to_state.attributes.data.get('error') }}

actions:

  ####################################################
  # 📱 Gửi Mobile App
  ####################################################
  - repeat:
      for_each: !input notify_device
      sequence:
        - service: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
          data:
            title: "🚗 Xe {{ vehicle_name }}"
            message: "{{ vehicle_state }}"
            data:
              tag: "{{ 'traffic_fine_' ~ trigger.entity_id }}"

  ####################################################
  # 💬 Gửi Zalo Bot chuẩn của anh
  ####################################################
  - service: zalo_bot.send_message
    data:
      type: "1"
      message: >
        🚗 Xe {{ vehicle_name }}

        {{ vehicle_state }}
      thread_id: "{{ zalo_thread }}"
      account_selection: "{{ zalo_account_selection }}"
