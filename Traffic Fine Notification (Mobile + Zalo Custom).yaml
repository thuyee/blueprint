blueprint:
  name: Traffic Fine Notification (Mobile + Zalo Custom)
  author: luuquangvu + modified by ChatGPT
  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    vehicles:
      name: Vehicles
      selector:
        entity:
          filter:
            - domain: sensor
              integration: template
          multiple: true

    notify_device:
      name: Device to notify (Mobile App)
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    zalo_service:
      name: Zalo service name
      description: Ví dụ script.send_zalo_message hoặc pyscript.zalo_send
      default: ""
      selector:
        text:

    zalo_thread_id:
      name: Zalo thread id
      default: ""
      selector:
        text:

mode: queued
max_exceeded: silent

variables:
  zalo_service_name: !input zalo_service
  zalo_thread: !input zalo_thread_id

triggers:
  - trigger: state
    entity_id: !input vehicles

conditions:
  - condition: template
    value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
  - condition: template
    value_template: "{{ trigger.to_state is not none and trigger.to_state.state not in ['unavailable', 'unknown'] }}"
  - condition: template
    value_template: "{{ not trigger.to_state.attributes.data.get('error') }}"

actions:

  # 📱 Mobile App
  - repeat:
      for_each: !input notify_device
      sequence:
        - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "🚗 Xe {{ trigger.to_state.attributes.friendly_name }}"
            message: "{{ trigger.to_state.state }}"
            data:
              tag: "{{ 'traffic_fine_' ~ trigger.entity_id }}"

  # 💬 Zalo Custom
  - if:
      - condition: template
        value_template: "{{ zalo_service_name != '' }}"
    then:
      - action: "{{ zalo_service_name }}"
        data:
          thread_id: "{{ zalo_thread }}"
          message: >
            🚗 Xe {{ trigger.to_state.attributes.friendly_name }}
            
            {{ trigger.to_state.state }}
