blueprint:
  name: Traffic Fine Notification (Mobile + Zalo Bot)
  author: luuquangvu + modified for Zalo Bot
  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    vehicles:
      name: Vehicles
      selector:
        entity:
          filter:
            - domain: sensor
              integration: template
          multiple: true

    notify_device:
      name: Device to notify (Mobile App)
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    zalo_thread_id:
      name: Zalo Thread ID
      selector:
        text:

    zalo_account:
      name: Zalo Account Selection
      description: Ví dụ +84868837123
      selector:
        text:

mode: queued
max_exceeded: silent

variables:
  zalo_thread: !input zalo_thread_id
  zalo_account_selection: !input zalo_account

triggers:
  - trigger: state
    entity_id: !input vehicles

conditions:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none 
         and trigger.from_state.state not in ['unavailable', 'unknown'] }}

  - condition: template
    value_template: >
      {{ trigger.to_state is not none 
         and trigger.to_state.state not in ['unavailable', 'unknown'] }}

  - condition: template
    value_template: >
      {{ not trigger.to_state.attributes.data.get('error') }}

actions:

  # 📱 Gửi Mobile App
  - repeat:
      for_each: !input notify_device
      sequence:
        - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "🚗 Xe {{ trigger.to_state.attributes.friendly_name }}"
            message: "{{ trigger.to_state.state }}"
            data:
              tag: "{{ 'traffic_fine_' ~ trigger.entity_id }}"

  # 💬 Gửi Zalo Bot chuẩn của anh
  - action: zalo_bot.send_message
    data:
      type: "1"
      message: >
        🚗 Xe {{ trigger.to_state.attributes.friendly_name }}

        {{ trigger.to_state.state }}
      thread_id: "{{ zalo_thread }}"
      account_selection: "{{ zalo_account_selection }}"
