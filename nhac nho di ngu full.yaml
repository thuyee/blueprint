blueprint:
  name: AI Good Night (Fix chuẩn device + optional)
  domain: automation

  input:
    notify_time:
      selector:
        time: {}
      default: "23:00:00"

    # ===== AI =====
    conversation_agent:
      selector:
        conversation_agent:

    prompt:
      selector:
        text:
          multiline: true
      default: >
        Nhắc đi ngủ tự nhiên, không liệt kê, có chúc ngủ ngon.

    # ===== MOBILE (CHỌN THEO DEVICE) =====
    enable_mobile:
      selector:
        boolean:
      default: true

    mobile_device:
      name: Chọn điện thoại
      selector:
        device:
          integration: mobile_app
      default: ""

    # ===== ZALO =====
    enable_zalo:
      selector:
        boolean:
      default: false

    zalo_thread_id:
      selector:
        text: {}
      default: ""

    zalo_account_selection:
      selector:
        text: {}
      default: ""

    zalo_type:
      selector:
        select:
          options:
            - label: Cá nhân
              value: "0"
            - label: Nhóm
              value: "1"
      default: "1"

    # ===== SPEAKER =====
    enable_tts:
      selector:
        boolean:
      default: false

    speaker:
      selector:
        entity:
          domain: media_player
      default: ""

    tts_engine:
      selector:
        entity:
          domain: tts
      default: ""

    tts_volume:
      selector:
        number:
          min: 0
          max: 1
      default: 0.6

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      mobile_device: !input mobile_device
      speaker: !input speaker
      tts_engine: !input tts_engine

  # ===== AI =====
  - service: conversation.process
    data:
      agent_id: !input conversation_agent
      text: >
        {{ prompt }}

        Trạng thái:
        {{ states }}
    response_variable: ai

  # ===== MOBILE =====
  - choose:
      - conditions:
          - "{{ mobile_device != '' and is_state('input_boolean.dummy','off') == false or true }}"
        sequence:
          - device_id: !input mobile_device
            domain: mobile_app
            type: notify
            title: "🌙 Đi ngủ thôi"
            message: "{{ ai.response.speech.plain.speech }}"

  # ===== ZALO =====
  - choose:
      - conditions:
          - "{{ !input enable_zalo and !input zalo_thread_id != '' }}"
        sequence:
          - service: zalo_bot.send_message
            data:
              message: "{{ ai.response.speech.plain.speech }}"
              thread_id: !input zalo_thread_id
              account_selection: !input zalo_account_selection
              type: !input zalo_type

  # ===== TTS =====
  - choose:
      - conditions:
          - "{{ !input enable_tts and speaker != '' and tts_engine != '' }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: !input speaker
            data:
              volume_level: !input tts_volume

          - service: tts.speak
            target:
              entity_id: !input tts_engine
            data:
              media_player_entity_id: !input speaker
              message: "{{ ai.response.speech.plain.speech }}"

mode: single
