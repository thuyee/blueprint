blueprint:
  name: Traffic Fine Notification (Mobile + Zalo Bot)
  description: Gửi thông báo phạt nguội qua Mobile App và Zalo Bot
  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    vehicles:
      name: Vehicles
      description: Chọn sensor biển số xe (template sensor)
      selector:
        entity:
          filter:
            - domain: sensor
              integration: template
          multiple: true

    notify_device:
      name: Device to notify (Mobile App)
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    zalo_thread_id:
      name: Zalo Thread ID
      selector:
        text:

    zalo_account:
      name: Zalo Account Selection
      selector:
        text:

mode: queued
max_exceeded: silent

####################################################
# TRIGGER
####################################################
triggers:
  - trigger: state
    entity_id: !input vehicles

####################################################
# CONDITIONS
####################################################
conditions:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.from_state.state not in ['unknown','unavailable'] }}

  - condition: template
    value_template: >
      {{ trigger.to_state is not none
         and trigger.to_state.state not in ['unknown','unavailable'] }}

  - condition: template
    value_template: >
      {{ trigger.to_state.attributes.get('data') is defined
         and not trigger.to_state.attributes.data.get('error') }}

####################################################
# ACTIONS
####################################################
actions:

  ####################################################
  # 📱 MOBILE APP
  ####################################################
  - repeat:
      for_each: !input notify_device
      sequence:
        - action: notify.mobile_app
          data:
            target: "{{ repeat.item }}"
            title: >
              🚗 Xe {{ trigger.to_state.attributes.friendly_name }}
            message: >
              {{ trigger.to_state.state }}
            data:
              tag: "{{ 'traffic_fine_' ~ trigger.entity_id }}"

  ####################################################
  # 💬 ZALO BOT
  ####################################################
  - action: zalo_bot.send_message
    data:
      type: "1"
      message: >
        🚗 Xe {{ trigger.to_state.attributes.friendly_name }}

        {{ trigger.to_state.state }}
      thread_id: !input zalo_thread_id
      account_selection: !input zalo_account
