blueprint:
  name: Good Night AI to Zalo + Mobile (Device chuẩn)
  domain: automation

  input:
    notify_time:
      selector:
        time: {}
      default: "23:00:00"

    # ===== MOBILE (CHỌN 1 THIẾT BỊ) =====
    enable_mobile:
      name: Bật thông báo điện thoại
      selector:
        boolean:
      default: true

    mobile_device:
      name: Chọn điện thoại
      selector:
        device:
          integration: mobile_app
      default: ""

    # ===== ZALO =====
    enable_zalo:
      selector:
        boolean:
      default: true

    zalo_thread_id:
      selector:
        text: {}
      default: ""

    zalo_account_selection:
      selector:
        text: {}
      default: ""

    zalo_type:
      selector:
        select:
          options:
            - label: Personal
              value: "0"
            - label: Group
              value: "1"
      default: "1"

    zalo_ttl:
      selector:
        number:
          min: 0
          max: 86400000
          step: 1000
      default: 0

    # ===== AI =====
    conversation_agent:
      selector:
        conversation_agent:

    prompt:
      selector:
        text:
          multiline: true
      default: >
        Bây giờ là 23h đêm.

        Hãy nhắc mọi người đi ngủ, kiểm tra cửa và đèn.
        Nếu còn mở/bật thì nhắc tự nhiên, không liệt kê.
        Cuối cùng chúc ngủ ngon.

    custom_footer:
      selector:
        text:
          multiline: true
      default: ""

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      enable_mobile: !input enable_mobile
      mobile_device: !input mobile_device
      enable_zalo: !input enable_zalo

  # ===== AI =====
  - service: conversation.process
    data:
      text: >
        Time: {{ now().strftime('%H:%M') }}

        {{ states.light | list }}
        {{ states.binary_sensor 
           | selectattr('attributes.device_class','in',['door','window']) 
           | list }}

        {{ custom_footer }}

        {{ !input prompt }}
      agent_id: !input conversation_agent
    response_variable: agent

  # ===== MOBILE (DEVICE STYLE – KHÔNG LOOP) =====
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_mobile and mobile_device != '' }}"
        sequence:
          - device_id: !input mobile_device
            domain: mobile_app
            type: notify
            title: "🌙 Đến giờ đi ngủ"
            message: "{{ agent.response.speech.plain.speech }}"

  # ===== ZALO =====
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_zalo }}"
        sequence:
          - service: zalo_bot.send_message
            data:
              message: "{{ agent.response.speech.plain.speech }}"
              thread_id: !input zalo_thread_id
              account_selection: !input zalo_account_selection
              type: !input zalo_type
              ttl: !input zalo_ttl

mode: single
