blueprint:
  name: Good Night AI to Zalo + Mobile (Multi Device chuẩn)
  domain: automation

  input:
    notify_time:
      selector:
        time: {}
      default: "23:00:00"

    # ===== MOBILE =====
    notify_device:
      name: Điện thoại nhận thông báo
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: true

    # ===== ZALO =====
    enable_zalo:
      selector:
        boolean:
      default: true

    zalo_thread_id:
      selector:
        text: {}
      default: ""

    zalo_account_selection:
      selector:
        text: {}
      default: ""

    zalo_type:
      selector:
        select:
          options:
            - label: Personal
              value: "0"
            - label: Group
              value: "1"
      default: "1"

    zalo_ttl:
      selector:
        number:
          min: 0
          max: 86400000
          step: 1000
      default: 0

    # ===== AI =====
    conversation_agent:
      selector:
        conversation_agent:

    prompt:
      selector:
        text:
          multiline: true
      default: >
        Bây giờ là 23h đêm.

        Hãy đóng vai một người thân trong gia đình, nhắc mọi người trước khi đi ngủ.

        Nếu còn cửa hoặc cửa sổ đang mở → nhắc đóng lại.
        Nếu còn đèn hoặc thiết bị đang bật → nhắc tắt đi.

        Không liệt kê dạng danh sách. Nói tự nhiên như người thật.

        Nếu mọi thứ đã ổn thì khen nhẹ.

        Cuối cùng chúc ngủ ngon ấm áp cho cả gia đình.

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      prompt: !input prompt
      enable_zalo: !input enable_zalo

  # ===== AI =====
  - service: conversation.process
    data:
      text: >
        Time: {{ now().strftime('%H:%M') }}

        {{ states.light | list }}
        {{ states.binary_sensor 
           | selectattr('attributes.device_class','in',['door','window']) 
           | list }}

        {{ prompt }}
      agent_id: !input conversation_agent
    response_variable: agent

  # ===== MOBILE =====
  - repeat:
      for_each: !input notify_device
      sequence:
        - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "🌙 Đến giờ đi ngủ"
            message: "{{ agent.response.speech.plain.speech }}"
            data:
              tag: "good_night_ai"

  # ===== ZALO =====
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_zalo }}"
        sequence:
          - service: zalo_bot.send_message
            data:
              message: "{{ agent.response.speech.plain.speech }}"
              thread_id: !input zalo_thread_id
              account_selection: !input zalo_account_selection
              type: !input zalo_type
              ttl: !input zalo_ttl

mode: single
