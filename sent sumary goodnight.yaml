blueprint:
  name: Good Night AI to Zalo + Mobile (Stable)
  domain: automation
  author: smarthomeblack + GPT fix chuẩn
  description: Night reminder with AI + Zalo + Mobile

  input:
    notify_time:
      name: Notification Time
      selector:
        time: {}
      default: "23:00:00"

    # ===== MOBILE =====
    mobile_notify:
      name: Chọn notify điện thoại
      selector:
        entity:
          domain: notify
          multiple: true
      default: []

    # ===== ZALO =====
    enable_zalo:
      name: Enable Send to Zalo
      selector:
        boolean:
      default: true

    zalo_thread_id:
      selector:
        text: {}
      default: ""

    zalo_account_selection:
      selector:
        text: {}
      default: ""

    zalo_type:
      selector:
        select:
          options:
            - label: Personal
              value: "0"
            - label: Group
              value: "1"
      default: "1"

    zalo_ttl:
      selector:
        number:
          min: 0
          max: 86400000
          step: 1000
      default: 0

    # ===== AI =====
    conversation_agent:
      selector:
        conversation_agent:

    prompt:
      selector:
        text:
          multiline: true
      default: >
        Bây giờ là 23h đêm.

        Hãy đóng vai một người thân trong gia đình, nhắc mọi người trước khi đi ngủ.

        Nếu còn cửa hoặc cửa sổ đang mở → nhắc đóng lại.
        Nếu còn đèn hoặc thiết bị đang bật → nhắc tắt đi.

        Không liệt kê dạng danh sách. Nói tự nhiên như người thật.

        Nếu mọi thứ đã ổn thì khen nhẹ.

        Cuối cùng chúc ngủ ngon ấm áp cho cả gia đình.

    custom_footer:
      selector:
        text:
          multiline: true
      default: ""

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      prompt: !input prompt
      custom_footer: !input custom_footer
      enable_zalo: !input enable_zalo

  # ===== AI =====
  - service: conversation.process
    data:
      text: >
        Time: {{ now().strftime('%H:%M') }}

        Trạng thái nhà:
        {{ states.light | list }}
        {{ states.binary_sensor 
           | selectattr('attributes.device_class','in',['door','window']) 
           | list }}

        {{ custom_footer }}

        {{ prompt }}
      agent_id: !input conversation_agent
    response_variable: agent

  # ===== MOBILE PUSH =====
  - repeat:
      for_each: !input mobile_notify
      sequence:
        - service: "{{ repeat.item }}"
          data:
            title: "🌙 Đến giờ đi ngủ"
            message: "{{ agent.response.speech.plain.speech }}"

  # ===== ZALO =====
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_zalo }}"
        sequence:
          - service: zalo_bot.send_message
            data:
              message: "{{ agent.response.speech.plain.speech }}"
              thread_id: !input zalo_thread_id
              account_selection: !input zalo_account_selection
              type: !input zalo_type
              ttl: !input zalo_ttl

mode: single
